  - campus: Campus Agrícola
    building: Laboratorio Central
    floor: "1"
    room: Lab-A
    is_active: true
  - campus: Campus Principal
    building: Biblioteca
    floor: "3"
    room: Sala de Estudio
    is_active: true
  - campus: Campus Principal
    building: Cafetería
    floor: null
    room: null
